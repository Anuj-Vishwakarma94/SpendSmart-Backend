server:
  port: 8080

spring:
  application:
    name: api-gateway
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://admin-server:9090}
        username: ${ADMIN_USERNAME}
        password: ${ADMIN_PASSWORD}
        instance:
          prefer-ip: true
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://127.0.0.1:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**, /api/admin/**
        - id: expense-service
          uri: lb://expense-service
          predicates:
            - Path=/api/expenses/**
        - id: income-service
          uri: lb://income-service
          predicates:
            - Path=/api/incomes/**
        - id: category-service
          uri: lb://category-service
          predicates:
            - Path=/api/categories/**
        - id: budget-service
          uri: lb://budget-service
          predicates:
            - Path=/api/budgets/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
        - id: recurring-service
          uri: lb://recurring-service
          predicates:
            - Path=/api/recurring/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscription/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
