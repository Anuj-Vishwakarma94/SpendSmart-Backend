server:
  port: 8087
spring:
  application:
    name: recurring-service
  datasource:
    url: jdbc:mysql://mysql:3306/spendsmart_recurring?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://localhost:9090}
        username: ${ADMIN_USERNAME}
        password: ${ADMIN_PASSWORD}
        instance:
          prefer-ip: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
cors:
  allowed-origins: http://localhost:5173
expense:
  service:
    url: ${EXPENSE_SERVICE_URL:http://localhost:8082}
income:
  service:
    url: ${INCOME_SERVICE_URL:http://localhost:8083}
logging:
  level:
    com:
      spendsmart: DEBUG
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
subscription:
  service:
    url: ${SUBSCRIPTION_SERVICE_URL:http://localhost:8090}
