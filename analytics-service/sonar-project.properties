# ── SonarQube Server ───────────────────────────────────────────────────────────
sonar.host.url=http://localhost:9000


# ── SonarQube Project Identity ─────────────────────────────────────────────────
sonar.projectKey=analytics-service
sonar.projectName=Analytics Service
sonar.projectVersion=1.0.0

# ── Source & Binary Paths ──────────────────────────────────────────────────────
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# ── JaCoCo XML Report (generated by: mvn verify) ──────────────────────────────
# SonarQube reads this file to calculate line/branch coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ── Exclusions (boilerplate — no need to cover these) ─────────────────────────
sonar.exclusions=\
  **/AnalyticsServiceApplication.java,\
  **/dto/**,\
  **/entity/**,\
  **/repository/**

sonar.coverage.exclusions=\
  **/AnalyticsServiceApplication.java,\
  **/dto/**,\
  **/entity/**,\
  **/repository/**

# ── Java version ───────────────────────────────────────────────────────────────
sonar.java.source=17
