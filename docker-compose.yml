# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  spendsmart-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Eureka Server ──────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: spendsmart-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DOTENV_IGNORE_MISSING: "true"
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx512m"
    networks:
      - spendsmart-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 240s

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: spendsmart-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - spendsmart-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
  # ── Admin Server ───────────────────────────────────────────────────────────
  admin-server:
    build:
      context: ./admin-server
      dockerfile: Dockerfile
    container_name: spendsmart-admin
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DOTENV_IGNORE_MISSING: "true"
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx512m"
      SPRING_BOOT_ADMIN_DISCOVERY_ENABLED: "true"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - spendsmart-net

  # ── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: spendsmart-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DOTENV_IGNORE_MISSING: "true"
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx256m"
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin-server:9090
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - spendsmart-net

  # ── Auth Service ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: spendsmart-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DOTENV_IGNORE_MISSING: "true"
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx256m"
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin-server:9090
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/spendsmart_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - spendsmart-net

  # ── Expense Service ────────────────────────────────────────────────────────
  expense-service:
