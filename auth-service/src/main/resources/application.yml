server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://mysql:3306/spendsmart_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:PassWord}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://admin-server:9090}
        username: ${ADMIN_USERNAME}
        password: ${ADMIN_PASSWORD}
        instance:
          prefer-ip: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
        debug: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173}
logging:
  level:
    com:
      spendsmart: DEBUG
    org:
      springframework:
        security: DEBUG
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:auth-service}
    nonSecurePort: 8081
    nonSecurePortEnabled: true
    securePortEnabled: false
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
google:
  client:
    id: ${GOOGLE_CLIENT_ID}
    secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: https://accounts.google.com/o/oauth2/auth
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  password-reset:
    expiry-minutes: 30
