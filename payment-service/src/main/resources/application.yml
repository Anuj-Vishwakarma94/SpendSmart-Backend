server:
  port: 8089
spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://mysql:3306/spendsmart_payment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:PassWord}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://admin-server:9090}
        username: ${ADMIN_USERNAME}
        password: ${ADMIN_PASSWORD}
        instance:
          prefer-ip: true
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET}
  currency: INR
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
auth:
  service:
    url: http://auth-service:8081
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173}
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:payment-service}
    nonSecurePort: 8089
    nonSecurePortEnabled: ${EUREKA_NON_SECURE_PORT_ENABLED:true}
    securePortEnabled: ${EUREKA_SECURE_PORT_ENABLED:false}
    securePort: ${EUREKA_SECURE_PORT:443}
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
logging:
  level:
    com:
      spendsmart: DEBUG
      razorpay: DEBUG
